name: benchmark

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: read
  contents: read

jobs:
  benchmark:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '/run-benchmark'))
    runs-on: ubuntu-latest

    steps:
      - name: Get PR branch
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_ref', pr.data.head.ref);

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.get-pr.outputs.head_ref }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("remotes", "bench"), repos = "https://cloud.r-project.org")'

      - name: Install PR branch package
        run: Rscript -e 'remotes::install_local(".", upgrade = "never")'

      - name: Run benchmark on PR branch
        run: |
          Rscript -e '
          library(caugi)
          library(bench)

          set.seed(1405)
          n <- 1000; p <- 0.25
          cg <- generate_graph(n, p, class="DAG")
          test_node_index <- sample(1000,1)
          test_node_name <- paste0("V", test_node_index)
          test_node_index_new <- sample(1000,1)
          test_node_name_new <- paste0("V", test_node_index)

          pr_time <- bench::mark(
            parents(cg, test_node_name),
            children(cg, test_node_name),
            ancestors(cg, test_node_name),
            descendants(cg, test_node_name),
            {
              valid_adjustment_set <- adjustment_set(cg, test_node_name, test_node_name_new, type="backdoor")
              d_separated(cg, test_node_name, test_node_name_new, valid_adjustment_set)
              subgraph(cg, test_node_name)
            },
            iterations = 5,
            check = FALSE
          )
          saveRDS(pr_time, "pr_time.rds")
          cat("PR benchmark done\\n")
          '

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout main

      - name: Install main branch package
        run: Rscript -e 'remotes::install_local(".", upgrade = "never")'

      - name: Run benchmark on main branch
        run: |
          Rscript -e '
          library(caugi)

          set.seed(1405)
          n <- 1000; p <- 0.25
          cg <- generate_graph(n, p, class="DAG")
          test_node_index <- sample(1000,1)
          test_node_name <- paste0("V", test_node_index)
          test_node_index_new <- sample(1000,1)
          test_node_name_new <- paste0("V", test_node_index)

          main_time <- bench::mark(
            parents(cg, test_node_name),
            children(cg, test_node_name),
            ancestors(cg, test_node_name),
            descendants(cg, test_node_name),
            {
              valid_adjustment_set <- adjustment_set(cg, test_node_name, test_node_name_new, type="backdoor")
              d_separated(cg, test_node_name, test_node_name_new, valid_adjustment_set)
              subgraph(cg, test_node_name)
            },
            iterations = 5,
            check = FALSE
          )
          saveRDS(main_time, "main_time.rds")
          cat("Main benchmark done\\n")
          '

      - name: Compare results
        run: |
          Rscript -e '
          pr <- readRDS("pr_time.rds")
          main <- readRDS("main_time.rds")
          cat("PR branch median (s):", median(pr$median), "\n")
          cat("Main branch median (s):", median(main$median), "\n")
          '